name: Test & Deploy OCR Server

on:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install test dependencies
        run: pip install fastapi uvicorn python-multipart httpx pytest pytest-asyncio pydantic-settings asyncpg "PyJWT[crypto]" --break-system-packages 2>/dev/null || pip install fastapi uvicorn python-multipart httpx pytest pytest-asyncio pydantic-settings asyncpg "PyJWT[crypto]"

      - name: Run tests
        env:
          OCR_API_KEY: test-key-for-ci
        run: python -m pytest tests/ -v

  deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to GPU server
        env:
          SSH_KEY: ${{ secrets.OCR_SERVER_SSH_KEY }}
          SSH_HOST: ${{ secrets.OCR_SERVER_HOST }}
          SSH_USER: ${{ secrets.OCR_SERVER_USER }}
          OCR_API_KEY: ${{ secrets.OCR_API_KEY }}
          OCR_INTERNAL_KEY: ${{ secrets.OCR_INTERNAL_KEY }}
          OPTII_DB_HOST: ${{ secrets.OPTII_DB_HOST }}
          OPTII_DB_USER: ${{ secrets.OPTII_DB_USER }}
          OPTII_DB_PASSWORD: ${{ secrets.OPTII_DB_PASSWORD }}
          OPTII_AUTH_CLIENT_ID: ${{ secrets.OPTII_AUTH_CLIENT_ID }}
          OPTII_AUTH_CLIENT_SECRET: ${{ secrets.OPTII_AUTH_CLIENT_SECRET }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/deploy_key ${SSH_USER}@${SSH_HOST} << 'SSHEOF'
            set -e
            cd /opt/ocr-server
            git pull origin main 2>/dev/null || git clone https://git.chut.me/optii.eu/chut.ocr.git .
            /opt/ocr-server/venv/bin/pip install -r requirements.txt --quiet 2>/dev/null || true
            sed -i 's|ExecStart=.*|ExecStart=/opt/ocr-server/venv/bin/uvicorn api.main:app --host 127.0.0.1 --port 8090|' /etc/systemd/system/ocr-server.service
            systemctl daemon-reload
            systemctl restart ocr-server
            cp nginx/ocr.chut.me.conf /etc/nginx/sites-available/ocr.chut.me
            ln -sf /etc/nginx/sites-available/ocr.chut.me /etc/nginx/sites-enabled/ocr.chut.me
            if [ -f /etc/letsencrypt/live/api.optii.eu/fullchain.pem ]; then
              cp nginx/api.optii.eu.conf /etc/nginx/sites-available/api.optii.eu
              ln -sf /etc/nginx/sites-available/api.optii.eu /etc/nginx/sites-enabled/api.optii.eu
            fi
            nginx -t && systemctl reload nginx
            sleep 10
            curl -sf http://localhost:8090/health && echo " Health OK" || { journalctl -u ocr-server --no-pager -n 20; exit 1; }
          SSHEOF

      - name: Smoke test
        env:
          OCR_INTERNAL_KEY: ${{ secrets.OCR_INTERNAL_KEY }}
        run: |
          pip install Pillow --quiet --break-system-packages 2>/dev/null || pip install Pillow --quiet
          python3 -c "
          from PIL import Image, ImageDraw
          img = Image.new('RGB', (400, 100), 'white')
          draw = ImageDraw.Draw(img)
          draw.text((10, 30), 'FACTURE N 2024-001 TVA BE0202239951', fill='black')
          img.save('/tmp/smoke_test.png')
          "
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST "https://ocr.chut.me/ocr/extract" \
            -H "X-API-Key: $OCR_INTERNAL_KEY" -F "file=@/tmp/smoke_test.png")
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          if [ "$HTTP_CODE" != "200" ]; then
            echo "Smoke test FAILED: $HTTP_CODE"
            exit 1
          fi
          echo "$RESPONSE" | head -n -1 | python3 -c "import sys,json; d=json.load(sys.stdin); print(f'OCR OK: {len(d[\"lines\"])} lines, {d[\"confidence\"]:.2%}, {d[\"processing_time_ms\"]}ms')"
