server {
    listen 80;
    server_name ocr.chut.me;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name ocr.chut.me;

    # TLS — Let's Encrypt (managed by certbot)
    ssl_certificate /etc/letsencrypt/live/ocr.chut.me/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ocr.chut.me/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # Security headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Content-Security-Policy "default-src 'none'" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # Hide server version
    server_tokens off;

    # Block all dotfiles (return 404, not 403, to hide existence)
    location ~ /\. {
        return 404;
    }

    # Request size limit (match app-level 20MB)
    client_max_body_size 20m;

    # Proxy to FastAPI
    location / {
        proxy_pass http://127.0.0.1:8090;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts for large file OCR processing
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }
}
