name: Test & Deploy OCR Server

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install test dependencies
        run: pip install fastapi uvicorn python-multipart httpx pytest pytest-asyncio

      - name: Run tests
        env:
          OCR_API_KEY: test-key-for-ci
        run: python -m pytest tests/ -v

  deploy:
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to GPU server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.OCR_SERVER_HOST }}
          username: ${{ secrets.OCR_SERVER_USER }}
          key: ${{ secrets.OCR_SERVER_SSH_KEY }}
          script: |
            set -e

            cd /opt/ocr-server
            git pull origin main 2>/dev/null || git clone https://github.com/chutapp/chut.ocr.git .

            # Configure OCR API keys in systemd service
            mkdir -p /etc/systemd/system/ocr-server.service.d
            cat > /etc/systemd/system/ocr-server.service.d/env.conf << 'ENVEOF'
            [Service]
            Environment="OCR_API_KEYS=optii:${{ secrets.OCR_INTERNAL_KEY }}"
            ENVEOF
            systemctl daemon-reload

            # Deploy app
            systemctl restart ocr-server

            # Deploy nginx config
            cp nginx/ocr.chut.me.conf /etc/nginx/sites-available/ocr.chut.me
            ln -sf /etc/nginx/sites-available/ocr.chut.me /etc/nginx/sites-enabled/ocr.chut.me
            nginx -t && systemctl reload nginx

            # Firewall: block port 8080 if open
            ufw deny 8080/tcp 2>/dev/null || true

            # Health check
            sleep 5
            curl -sf http://localhost:8090/health && echo "Deploy OK" || echo "Deploy FAILED"
