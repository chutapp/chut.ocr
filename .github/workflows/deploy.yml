name: Test OCR Server

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install test dependencies
        run: pip install fastapi uvicorn python-multipart httpx pytest pytest-asyncio pydantic-settings asyncpg PyJWT[crypto]

      - name: Run tests
        env:
          OCR_API_KEY: test-key-for-ci
        run: python -m pytest tests/ -v
