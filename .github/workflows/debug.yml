name: Debug OCR Server

on:
  workflow_dispatch:

jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - name: Check server logs
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.OCR_SERVER_HOST }}
          username: ${{ secrets.OCR_SERVER_USER }}
          key: ${{ secrets.OCR_SERVER_SSH_KEY }}
          script: |
            echo "=== Service status ==="
            systemctl status ocr-server --no-pager -l | tail -30

            echo ""
            echo "=== Journal logs (last 50 lines) ==="
            journalctl -u ocr-server --no-pager -n 50

            echo ""
            echo "=== Env conf ==="
            cat /etc/systemd/system/ocr-server.service.d/env.conf 2>/dev/null || echo "No env.conf"

            echo ""
            echo "=== Service file ==="
            cat /etc/systemd/system/ocr-server.service 2>/dev/null || systemctl cat ocr-server 2>/dev/null

            echo ""
            echo "=== PaddleOCR version ==="
            pip show paddleocr 2>/dev/null | grep Version

            echo ""
            echo "=== Python test ==="
            cd /opt/ocr-server && python3 -c "
            from paddleocr import PaddleOCR
            import inspect
            params = list(inspect.signature(PaddleOCR.__init__).parameters.keys())
            print('PaddleOCR params:', params[:10], '...')
            "
